services:
  - type: web
    name: jds-serv
    env: python
    buildCommand: |
      pip install -r jds_web/requirements.txt
      cd jds_web && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: cd jds_web && gunicorn jds_web.wsgi:application --workers=2 --threads=2 --timeout=120 --bind=0.0.0.0:$PORT
    disk:
      name: backup-data
      mountPath: /opt/render/project/src/jds_web/media
      sizeGB: 10
